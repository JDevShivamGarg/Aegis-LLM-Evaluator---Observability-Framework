version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: aegis_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eval_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eval_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aegis_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    container_name: aegis_api
    ports:
      - "8000:8000"
    volumes:
      - ../src:/app/src
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/eval_db
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=aegis_local_dev_secret_key_change_in_production
      - JWT_EXPIRY_SECONDS=3600
      - CELERY_CONCURRENCY=4
      - EMBEDDING_MODEL_PATH=all-MiniLM-L6-v2
      - EVAL_MAX_RETRIES=3
      - EVAL_TIMEOUT_SECONDS=30
      - OPENAI_API_KEY=sk-placeholder
      - GROQ_API_KEY=$GROQ_API_KEY
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    container_name: aegis_worker
    volumes:
      - ../src:/app/src
      # Mount cache directory for Hugging Face models so they aren't redownloaded on rebuild
      - hf_cache:/root/.cache/huggingface
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/eval_db
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=aegis_local_dev_secret_key_change_in_production
      - JWT_EXPIRY_SECONDS=3600
      - CELERY_CONCURRENCY=4
      - EMBEDDING_MODEL_PATH=all-MiniLM-L6-v2
      - EVAL_MAX_RETRIES=3
      - EVAL_TIMEOUT_SECONDS=30
      - OPENAI_API_KEY=sk-placeholder
      - GROQ_API_KEY=$GROQ_API_KEY
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    container_name: aegis_dashboard
    ports:
      - "8501:8501"
    volumes:
      - ../src:/app/src
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/eval_db
    command: ["streamlit", "run", "src/dashboard/app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  hf_cache:
