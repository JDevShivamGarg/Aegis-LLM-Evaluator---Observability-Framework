apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aegis-api
  template:
    metadata:
      labels:
        app: aegis-api
    spec:
      containers:
        - name: api
          image: infra-api:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: DATABASE_URL
              value: "postgresql://postgres:postgres@aegis-db:5432/eval_db"
            - name: REDIS_URL
              value: "redis://aegis-redis:6379/0"
            - name: CELERY_BROKER_URL
              value: "redis://aegis-redis:6379/0"
            - name: CELERY_RESULT_BACKEND
              value: "redis://aegis-redis:6379/0"
            - name: JWT_SECRET
              value: "supersecret-jwt-key"
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: aegis-api
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: aegis-api
